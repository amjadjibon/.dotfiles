---
- name: Symlink .zshrc
  file:
    src: "{{ dotfiles_dir }}/zsh/.zshrc"
    dest: "{{ home_dir }}/.zshrc"
    state: link
    force: true

- name: Symlink tmux.conf
  file:
    src: "{{ dotfiles_dir }}/tmux/tmux.conf"
    dest: "{{ home_dir }}/.tmux.conf"
    state: link
    force: true

- name: Symlink .gitconfig
  file:
    src: "{{ dotfiles_dir }}/git/.gitconfig"
    dest: "{{ home_dir }}/.gitconfig"
    state: link
    force: true

- name: Symlink .gitignore
  file:
    src: "{{ dotfiles_dir }}/git/.gitignore"
    dest: "{{ home_dir }}/.gitignore"
    state: link
    force: true

- name: Ensure ~/.ssh directory exists
  file:
    path: "{{ home_dir }}/.ssh"
    state: directory
    mode: "0700"

- name: Symlink SSH config
  file:
    src: "{{ dotfiles_dir }}/ssh/config"
    dest: "{{ home_dir }}/.ssh/config"
    state: link
    force: true

- name: Ensure ~/.config/jj directory exists
  file:
    path: "{{ home_dir }}/.config/jj"
    state: directory
    mode: "0755"

- name: Symlink jj config.toml
  file:
    src: "{{ dotfiles_dir }}/jj/config.toml"
    dest: "{{ home_dir }}/.config/jj/config.toml"
    state: link
    force: true
