---
# MesloLGS NF is the font patched by the Powerlevel10k author and is required
# for correct glyph rendering in both Powerlevel10k and NvChad.
# Source: https://github.com/romkatv/powerlevel10k#meslo-nerd-font-patched-for-powerlevel10k

- name: Set font destination directory (macOS)
  set_fact:
    font_dir: "{{ home_dir }}/Library/Fonts"
  when: ansible_facts['os_family'] == 'Darwin'

- name: Set font destination directory (Linux)
  set_fact:
    font_dir: "{{ home_dir }}/.local/share/fonts/MesloLGS-NF"
  when: ansible_facts['os_family'] != 'Darwin'

- name: Ensure font directory exists
  file:
    path: "{{ font_dir }}"
    state: directory
    mode: "0755"

# ── Install fontconfig on Linux (provides fc-cache) ───────────────────────────
- name: Install fontconfig (Debian/Ubuntu)
  apt:
    name: fontconfig
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Install fontconfig (Fedora/RHEL)
  dnf:
    name: fontconfig
    state: present
  become: true
  when: ansible_facts['os_family'] == 'RedHat'

- name: Install fontconfig (Arch)
  community.general.pacman:
    name: fontconfig
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Archlinux'

# ── Download MesloLGS NF ──────────────────────────────────────────────────────
- name: Download MesloLGS NF fonts
  get_url:
    url: "https://github.com/romkatv/powerlevel10k-media/raw/master/{{ item | urlencode }}"
    dest: "{{ font_dir }}/{{ item }}"
    mode: "0644"
  loop:
    - "MesloLGS NF Regular.ttf"
    - "MesloLGS NF Bold.ttf"
    - "MesloLGS NF Italic.ttf"
    - "MesloLGS NF Bold Italic.ttf"

# ── Rebuild font cache (Linux only) ───────────────────────────────────────────
- name: Rebuild font cache
  shell: fc-cache -fv
  when: ansible_facts['os_family'] != 'Darwin'
