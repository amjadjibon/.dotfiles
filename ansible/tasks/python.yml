---
# ── Install uv ────────────────────────────────────────────────────────────────
- name: Install uv (macOS)
  community.general.homebrew:
    name: uv
    state: present
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install uv (Linux)
  shell: curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: "{{ home_dir }}/.local/bin/uv"
  environment:
    HOME: "{{ home_dir }}"
  when: ansible_facts['os_family'] != 'Darwin'

# ── Python runtime ────────────────────────────────────────────────────────────
- name: Install latest stable Python via uv
  shell: uv python install
  changed_when: false
  environment:
    PATH: "{{ home_dir }}/.local/bin:/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"

# ── Global tools ──────────────────────────────────────────────────────────────
- name: Install Python tools via uv tool
  shell: uv tool install {{ item.pkg }}
  args:
    creates: "{{ home_dir }}/.local/bin/{{ item.bin }}"
  environment:
    PATH: "{{ home_dir }}/.local/bin:/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
  loop:
    - { pkg: ruff,       bin: ruff       }
    - { pkg: ty,         bin: ty         }
    - { pkg: ipython,    bin: ipython    }
    - { pkg: jupyterlab, bin: jupyter    }
