---
# ── macOS ─────────────────────────────────────────────────────────────────────
- name: Check if Homebrew is installed
  stat:
    path: /opt/homebrew/bin/brew
  register: brew_stat
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install Homebrew
  shell: NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  args:
    creates: /opt/homebrew/bin/brew
  when: ansible_facts['os_family'] == 'Darwin' and not brew_stat.stat.exists

- name: Install core packages (macOS)
  community.general.homebrew:
    name:
      - git
      - curl
      - wget
      - ripgrep
      - fd
      - fzf
      - lazygit
      - git-delta
      - tree
      - jq
      - htop
      - fastfetch
    state: present
    update_homebrew: true
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
  when: ansible_facts['os_family'] == 'Darwin'

# ── Debian / Ubuntu ───────────────────────────────────────────────────────────
- name: Update apt cache (Debian/Ubuntu)
  apt:
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Install core packages (Debian/Ubuntu)
  apt:
    name:
      - git
      - curl
      - wget
      - ripgrep
      - fd-find
      - fzf
      - tree
      - jq
      - htop
      - build-essential
      - unzip
      - software-properties-common
      - git-delta
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Debian'

# fastfetch is not in apt — install from GitHub release
- name: Check if fastfetch is installed (Debian/Ubuntu)
  stat:
    path: /usr/local/bin/fastfetch
  register: fastfetch_stat
  when: ansible_facts['os_family'] == 'Debian'

- name: Install fastfetch (Debian/Ubuntu)
  shell: |
    FASTFETCH_VERSION=$(curl -s "https://api.github.com/repos/fastfetch-cli/fastfetch/releases/latest" | grep '"tag_name"' | sed 's/.*"\(.*\)".*/\1/')
    curl -Lo /tmp/fastfetch.deb "https://github.com/fastfetch-cli/fastfetch/releases/latest/download/fastfetch-linux-amd64.deb"
    dpkg -i /tmp/fastfetch.deb
    rm /tmp/fastfetch.deb
  args:
    creates: /usr/local/bin/fastfetch
  become: true
  when: ansible_facts['os_family'] == 'Debian' and not fastfetch_stat.stat.exists

# lazygit is not in apt — install from GitHub release
- name: Check if lazygit is installed (Debian/Ubuntu)
  stat:
    path: /usr/local/bin/lazygit
  register: lazygit_stat
  when: ansible_facts['os_family'] == 'Debian'

- name: Install lazygit (Debian/Ubuntu)
  shell: |
    LAZYGIT_VERSION=$(curl -s "https://api.github.com/repos/jesseduffield/lazygit/releases/latest" | grep '"tag_name"' | sed 's/.*"v\(.*\)".*/\1/')
    curl -Lo /tmp/lazygit.tar.gz "https://github.com/jesseduffield/lazygit/releases/latest/download/lazygit_${LAZYGIT_VERSION}_Linux_x86_64.tar.gz"
    tar -C /usr/local/bin -xzf /tmp/lazygit.tar.gz lazygit
    rm /tmp/lazygit.tar.gz
  args:
    creates: /usr/local/bin/lazygit
  become: true
  when: ansible_facts['os_family'] == 'Debian' and not lazygit_stat.stat.exists

# ── Fedora / RHEL ─────────────────────────────────────────────────────────────
- name: Install core packages (Fedora/RHEL)
  dnf:
    name:
      - git
      - curl
      - wget
      - ripgrep
      - fd-find
      - fzf
      - tree
      - jq
      - htop
      - gcc
      - make
      - unzip
    state: present
  become: true
  when: ansible_facts['os_family'] == 'RedHat'

# fastfetch is not in dnf — install from GitHub release
- name: Check if fastfetch is installed (Fedora/RHEL)
  stat:
    path: /usr/local/bin/fastfetch
  register: fastfetch_stat_rhel
  when: ansible_facts['os_family'] == 'RedHat'

- name: Install fastfetch (Fedora/RHEL)
  shell: |
    curl -Lo /tmp/fastfetch.rpm "https://github.com/fastfetch-cli/fastfetch/releases/latest/download/fastfetch-linux-amd64.rpm"
    rpm -i /tmp/fastfetch.rpm
    rm /tmp/fastfetch.rpm
  args:
    creates: /usr/local/bin/fastfetch
  become: true
  when: ansible_facts['os_family'] == 'RedHat' and not fastfetch_stat_rhel.stat.exists

# lazygit is not in dnf — install from GitHub release
- name: Check if lazygit is installed (Fedora/RHEL)
  stat:
    path: /usr/local/bin/lazygit
  register: lazygit_stat_rhel
  when: ansible_facts['os_family'] == 'RedHat'

- name: Install lazygit (Fedora/RHEL)
  shell: |
    LAZYGIT_VERSION=$(curl -s "https://api.github.com/repos/jesseduffield/lazygit/releases/latest" | grep '"tag_name"' | sed 's/.*"v\(.*\)".*/\1/')
    curl -Lo /tmp/lazygit.tar.gz "https://github.com/jesseduffield/lazygit/releases/latest/download/lazygit_${LAZYGIT_VERSION}_Linux_x86_64.tar.gz"
    tar -C /usr/local/bin -xzf /tmp/lazygit.tar.gz lazygit
    rm /tmp/lazygit.tar.gz
  args:
    creates: /usr/local/bin/lazygit
  become: true
  when: ansible_facts['os_family'] == 'RedHat' and not lazygit_stat_rhel.stat.exists

# git-delta is not in dnf — install from GitHub release
- name: Check if git-delta is installed (Fedora/RHEL)
  stat:
    path: /usr/local/bin/delta
  register: delta_stat_rhel
  when: ansible_facts['os_family'] == 'RedHat'

- name: Install git-delta (Fedora/RHEL)
  shell: |
    DELTA_VERSION=$(curl -s "https://api.github.com/repos/dandavison/delta/releases/latest" | grep '"tag_name"' | sed 's/.*"\(.*\)".*/\1/')
    curl -Lo /tmp/delta.tar.gz "https://github.com/dandavison/delta/releases/latest/download/delta-${DELTA_VERSION}-x86_64-unknown-linux-musl.tar.gz"
    tar -C /tmp -xzf /tmp/delta.tar.gz
    mv /tmp/delta-${DELTA_VERSION}-x86_64-unknown-linux-musl/delta /usr/local/bin/delta
    rm -rf /tmp/delta.tar.gz /tmp/delta-${DELTA_VERSION}-x86_64-unknown-linux-musl
  args:
    creates: /usr/local/bin/delta
  become: true
  when: ansible_facts['os_family'] == 'RedHat' and not delta_stat_rhel.stat.exists

# ── Arch Linux ────────────────────────────────────────────────────────────────
- name: Install core packages (Arch)
  community.general.pacman:
    name:
      - git
      - curl
      - wget
      - ripgrep
      - fd
      - fzf
      - lazygit
      - tree
      - jq
      - htop
      - base-devel
      - unzip
      - git-delta
      - fastfetch
    state: present
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == 'Archlinux'
