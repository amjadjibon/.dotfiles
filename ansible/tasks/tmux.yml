---
- name: Install tmux (macOS)
  community.general.homebrew:
    name: tmux
    state: present
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install tmux (Debian/Ubuntu)
  apt:
    name: tmux
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Install tmux (Fedora/RHEL)
  dnf:
    name: tmux
    state: present
  become: true
  when: ansible_facts['os_family'] == 'RedHat'

- name: Install tmux (Arch)
  community.general.pacman:
    name: tmux
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Archlinux'

- name: Install TPM (Tmux Plugin Manager)
  git:
    repo: https://github.com/tmux-plugins/tpm.git
    dest: "{{ home_dir }}/.tmux/plugins/tpm"
    update: false

# Bootstrap runs after dotfiles task has symlinked .tmux.conf
- name: Bootstrap TPM plugins headlessly
  shell: "{{ home_dir }}/.tmux/plugins/tpm/bin/install_plugins"
  args:
    creates: "{{ home_dir }}/.tmux/plugins/tmux-sensible"
  environment:
    TMUX_PLUGIN_MANAGER_PATH: "{{ home_dir }}/.tmux/plugins/"
