---
# ── macOS ─────────────────────────────────────────────────────────────────────
- name: Install Terraform (macOS)
  community.general.homebrew:
    name: hashicorp/tap/terraform
    state: present
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
  when: ansible_facts['os_family'] == 'Darwin'

# ── Debian / Ubuntu ───────────────────────────────────────────────────────────
- name: Add HashiCorp GPG key (Debian/Ubuntu)
  shell: |
    curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Add HashiCorp apt repository (Debian/Ubuntu)
  deb822_repository:
    name: hashicorp
    types: deb
    uris: https://apt.releases.hashicorp.com
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: main
    signed_by: /usr/share/keyrings/hashicorp-archive-keyring.gpg
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Install Terraform (Debian/Ubuntu)
  apt:
    name: terraform
    state: present
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == 'Debian'

# ── Fedora / RHEL ─────────────────────────────────────────────────────────────
- name: Set Terraform arch (Fedora/RHEL)
  set_fact:
    tf_linux_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"
  when: ansible_facts['os_family'] == 'RedHat'

- name: Check if Terraform is installed (Fedora/RHEL)
  stat:
    path: /usr/local/bin/terraform
  register: terraform_stat_rhel
  when: ansible_facts['os_family'] == 'RedHat'

- name: Install Terraform (Fedora/RHEL)
  shell: |
    VERSION=$(curl -s https://api.github.com/repos/hashicorp/terraform/releases/latest | jq -r '.tag_name | ltrimstr("v")')
    curl -Lo /tmp/terraform.zip "https://releases.hashicorp.com/terraform/${VERSION}/terraform_${VERSION}_linux_{{ tf_linux_arch }}.zip"
    unzip -o /tmp/terraform.zip -d /usr/local/bin terraform
    chmod +x /usr/local/bin/terraform
    rm /tmp/terraform.zip
  args:
    creates: /usr/local/bin/terraform
  become: true
  when: ansible_facts['os_family'] == 'RedHat' and not terraform_stat_rhel.stat.exists

# ── Arch Linux ────────────────────────────────────────────────────────────────
- name: Install Terraform (Arch)
  community.general.pacman:
    name: terraform
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Archlinux'
