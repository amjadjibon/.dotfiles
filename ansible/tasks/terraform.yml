---
# ── macOS ─────────────────────────────────────────────────────────────────────
- name: Install Terraform (macOS)
  community.general.homebrew:
    name: hashicorp/tap/terraform
    state: present
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
  when: ansible_facts['os_family'] == 'Darwin'

# ── Debian / Ubuntu ───────────────────────────────────────────────────────────
- name: Add HashiCorp GPG key (Debian/Ubuntu)
  shell: |
    curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Add HashiCorp apt repository (Debian/Ubuntu)
  deb822_repository:
    name: hashicorp
    types: deb
    uris: https://apt.releases.hashicorp.com
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: main
    signed_by: /usr/share/keyrings/hashicorp-archive-keyring.gpg
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Install Terraform (Debian/Ubuntu)
  apt:
    name: terraform
    state: present
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == 'Debian'

# ── Fedora / RHEL ─────────────────────────────────────────────────────────────
- name: Add HashiCorp dnf repository (Fedora/RHEL)
  shell: |
    dnf config-manager --add-repo https://rpm.releases.hashicorp.com/fedora/hashicorp.repo
  args:
    creates: /etc/yum.repos.d/hashicorp.repo
  become: true
  when: ansible_facts['os_family'] == 'RedHat'

- name: Install Terraform (Fedora/RHEL)
  dnf:
    name: terraform
    state: present
  become: true
  when: ansible_facts['os_family'] == 'RedHat'

# ── Arch Linux ────────────────────────────────────────────────────────────────
- name: Install Terraform (Arch)
  community.general.pacman:
    name: terraform
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Archlinux'
