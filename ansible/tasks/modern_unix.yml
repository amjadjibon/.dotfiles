---
# Modern Unix tools — optional replacements for standard Unix commands.
# Install with: ansible-playbook ... --tags modern-unix

# ── macOS — all available via Homebrew ────────────────────────────────────────
- name: Install modern Unix tools (macOS)
  community.general.homebrew:
    name:
      - bat         # cat with syntax highlighting
      - eza         # modern ls
      - lsd         # ls with icons
      - dust        # intuitive du
      - duf         # better df
      - broot       # interactive directory tree
      - mcfly       # smart shell history
      - choose      # human-friendly cut
      - sd          # intuitive sed
      - tldr        # practical man pages
      - bottom      # graphical process monitor (btm)
      - glances     # top/htop alternative
      - hyperfine   # benchmarking tool
      - gping       # ping with graph
      - procs       # modern ps
      - httpie      # user-friendly HTTP client
      - curlie      # curl + httpie UX
      - xh          # fast HTTP requests
      - zoxide      # smarter cd
      - doggo       # modern dig
      - cheat       # interactive cheatsheets
    state: present
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_env.PATH }}"
  when: ansible_facts['os_family'] == 'Darwin'

# ── Linux — package manager for Python/system tools ───────────────────────────
- name: Install non-Rust modern tools via apt (Debian/Ubuntu)
  apt:
    name:
      - bat
      - duf
      - httpie
      - glances
      - tldr
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Install non-Rust modern tools via dnf (Fedora/RHEL)
  dnf:
    name:
      - bat
      - duf
      - httpie
      - glances
      - tealdeer
    state: present
  become: true
  when: ansible_facts['os_family'] == 'RedHat'

- name: Install non-Rust modern tools via pacman (Arch)
  community.general.pacman:
    name:
      - bat
      - duf
      - httpie
      - glances
      - tldr
      - bottom
      - hyperfine
      - procs
      - zoxide
      - xh
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Archlinux'

# ── Linux — cargo-binstall for Rust tools ─────────────────────────────────────
# cargo-binstall downloads pre-compiled binaries — no compilation needed.
- name: Install cargo-binstall (Linux)
  shell: cargo install cargo-binstall
  args:
    creates: "{{ home_dir }}/.cargo/bin/cargo-binstall"
  environment:
    PATH: "{{ home_dir }}/.cargo/bin:{{ ansible_env.PATH }}"
  when: ansible_facts['os_family'] != 'Darwin'

- name: Install Rust-based modern tools via cargo-binstall (Linux)
  shell: "{{ home_dir }}/.cargo/bin/cargo-binstall -y {{ item.crate }}"
  args:
    creates: "{{ home_dir }}/.cargo/bin/{{ item.bin }}"
  environment:
    PATH: "{{ home_dir }}/.cargo/bin:{{ ansible_env.PATH }}"
  loop:
    - { crate: eza,        bin: eza       }
    - { crate: lsd,        bin: lsd       }
    - { crate: du-dust,    bin: dust      }
    - { crate: broot,      bin: broot     }
    - { crate: mcfly,      bin: mcfly     }
    - { crate: choose,     bin: choose    }
    - { crate: sd,         bin: sd        }
    - { crate: bottom,     bin: btm       }
    - { crate: hyperfine,  bin: hyperfine }
    - { crate: gping,      bin: gping     }
    - { crate: procs,      bin: procs     }
    - { crate: xh,         bin: xh        }
    - { crate: zoxide,     bin: zoxide    }
  when: ansible_facts['os_family'] not in ['Darwin', 'Archlinux']
