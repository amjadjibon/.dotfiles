---
# ── macOS ─────────────────────────────────────────────────────────────────────
- name: Install claude-code cask (macOS)
  community.general.homebrew_cask:
    name: claude-code
    state: present
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
  when: ansible_facts['os_family'] == 'Darwin'

- name: Tap sst/tap (macOS)
  community.general.homebrew_tap:
    name: sst/tap
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install opencode via brew (macOS)
  community.general.homebrew:
    name: sst/tap/opencode
    state: present
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install codex via npm (macOS)
  shell: npm install -g @openai/codex
  args:
    creates: /opt/homebrew/bin/codex
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
  when: ansible_facts['os_family'] == 'Darwin'

# ── Linux ─────────────────────────────────────────────────────────────────────
- name: Check if claude is installed
  shell: |
    export PATH="{{ home_dir }}/.claude/local:{{ home_dir }}/.local/bin:$PATH"
    command -v claude
  register: claude_check
  failed_when: false
  changed_when: false
  args:
    executable: /bin/bash
  when: ansible_facts['os_family'] != 'Darwin'

- name: Install claude-code via official installer
  shell: curl -fsSL https://claude.ai/install.sh | bash
  args:
    executable: /bin/bash
  when: ansible_facts['os_family'] != 'Darwin' and claude_check.rc != 0

- name: Check if codex is installed
  shell: |
    export PATH="{{ home_dir }}/.local/bin:{{ home_dir }}/.codex/bin:$PATH"
    command -v codex
  register: codex_check
  failed_when: false
  changed_when: false
  args:
    executable: /bin/bash
  when: ansible_facts['os_family'] != 'Darwin'

- name: Install codex via official installer
  shell: curl -fsSL https://chatgpt.com/codex/install.sh | CODEX_NON_INTERACTIVE=1 sh
  args:
    executable: /bin/sh
  when: ansible_facts['os_family'] != 'Darwin' and codex_check.rc != 0

- name: Check if opencode is installed
  shell: |
    export PATH="{{ home_dir }}/.local/bin:$PATH"
    command -v opencode
  register: opencode_check
  failed_when: false
  changed_when: false
  args:
    executable: /bin/bash
  when: ansible_facts['os_family'] != 'Darwin'

- name: Install opencode via official installer
  shell: curl -fsSL https://opencode.ai/install | bash
  args:
    executable: /bin/bash
  when: ansible_facts['os_family'] != 'Darwin' and opencode_check.rc != 0
