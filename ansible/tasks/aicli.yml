---
- name: Check if claude-code is installed
  stat:
    path: "{{ home_dir }}/.claude/local/claude"
  register: claude_stat

- name: Install claude-code via official installer
  shell: curl -fsSL https://claude.ai/install.sh | bash
  args:
    executable: /bin/bash
  when: not claude_stat.stat.exists

- name: Check if codex is installed
  stat:
    path: "{{ home_dir }}/.codex/bin/codex"
  register: codex_stat

- name: Install codex via official installer
  shell: curl -fsSL https://chatgpt.com/codex/install.sh | sh
  args:
    executable: /bin/sh
  when: not codex_stat.stat.exists

- name: Check if opencode is installed
  stat:
    path: "{{ home_dir }}/.local/bin/opencode"
  register: opencode_stat

- name: Install opencode via official installer
  shell: curl -fsSL https://opencode.ai/install | bash
  args:
    executable: /bin/bash
  when: not opencode_stat.stat.exists
