---
# ── Install Go ────────────────────────────────────────────────────────────────
- name: Install Go (macOS)
  community.general.homebrew:
    name: go
    state: present
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install Go (Arch)
  community.general.pacman:
    name: go
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Archlinux'

# Debian/Ubuntu and Fedora/RHEL both get the official golang.org binary
# to avoid distro-packaged Go being outdated or carrying patches (e.g. GOSUMDB=off on Fedora)
- name: Set Go download arch (Linux)
  set_fact:
    go_linux_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"
  when: ansible_facts['os_family'] in ['Debian', 'RedHat']

- name: Check if Go is installed (Linux)
  stat:
    path: /usr/local/go/bin/go
  register: go_linux_stat
  when: ansible_facts['os_family'] in ['Debian', 'RedHat']

- name: Get latest Go version (Linux)
  uri:
    url: https://go.dev/VERSION?m=text
    return_content: true
  register: go_latest_version
  when: ansible_facts['os_family'] in ['Debian', 'RedHat'] and not go_linux_stat.stat.exists

- name: Download and install Go (Linux)
  shell: |
    VERSION={{ go_latest_version.content.split('\n')[0] }}
    curl -fsSL "https://go.dev/dl/${VERSION}.linux-{{ go_linux_arch }}.tar.gz" | tar -C /usr/local -xzf -
  args:
    creates: /usr/local/go/bin/go
  become: true
  when: ansible_facts['os_family'] in ['Debian', 'RedHat'] and not go_linux_stat.stat.exists

# ── Workspace ─────────────────────────────────────────────────────────────────
- name: Ensure Go workspace directories exist
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ home_dir }}/go/src"
    - "{{ home_dir }}/go/bin"
    - "{{ home_dir }}/go/pkg"

# ── Developer tools (each guarded independently) ──────────────────────────────
- name: Install gopls
  shell: go install golang.org/x/tools/gopls@latest
  args:
    creates: "{{ home_dir }}/go/bin/gopls"
  environment:
    PATH: "{{ go_bin_dir }}:{{ ansible_facts['env']['PATH'] }}"
    GOPATH: "{{ home_dir }}/go"
    GOTOOLCHAIN: local

- name: Install delve (dlv)
  shell: go install github.com/go-delve/delve/cmd/dlv@latest
  args:
    creates: "{{ home_dir }}/go/bin/dlv"
  environment:
    PATH: "{{ go_bin_dir }}:{{ ansible_facts['env']['PATH'] }}"
    GOPATH: "{{ home_dir }}/go"
    GOTOOLCHAIN: local

- name: Install golangci-lint
  shell: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
  args:
    creates: "{{ home_dir }}/go/bin/golangci-lint"
  environment:
    PATH: "{{ go_bin_dir }}:{{ ansible_facts['env']['PATH'] }}"
    GOPATH: "{{ home_dir }}/go"
    GOTOOLCHAIN: local

- name: Install gofumpt
  shell: go install mvdan.cc/gofumpt@latest
  args:
    creates: "{{ home_dir }}/go/bin/gofumpt"
  environment:
    PATH: "{{ go_bin_dir }}:{{ ansible_facts['env']['PATH'] }}"
    GOPATH: "{{ home_dir }}/go"
    GOTOOLCHAIN: local
