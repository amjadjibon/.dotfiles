---
- name: Check if Rust is installed
  stat:
    path: "{{ home_dir }}/.cargo/bin/rustc"
  register: rust_stat

- name: Install Rust via rustup
  shell: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path
  args:
    creates: "{{ home_dir }}/.cargo/bin/rustc"
  when: not rust_stat.stat.exists

- name: Install Rust components and tools
  shell: |
    source {{ home_dir }}/.cargo/env
    rustup component add clippy rustfmt rust-analyzer
    cargo install cargo-watch cargo-edit
  args:
    creates: "{{ home_dir }}/.cargo/bin/cargo-watch"
  environment:
    PATH: "{{ home_dir }}/.cargo/bin:{{ ansible_facts['env']['PATH'] }}"
