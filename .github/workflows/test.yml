name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Ubuntu (GitHub runner)
    runs-on: ubuntu-latest
    env:
      DOTFILES_DIR: ${{ github.workspace }}
      SKIP_CLONE: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run bootstrap
        run: >
          bash bootstrap.sh
          --extra-vars headless=true
          -e ansible_python_interpreter=/usr/bin/python3
